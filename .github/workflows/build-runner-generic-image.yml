name: Build Runner Generic Image

on:
  workflow_dispatch:
  push:
    branches:
      - master
    # Rebuild whenever anything baked INTO the runner image changes — not just the
    # Dockerfile. The `runner` target bakes the compiled source (src → dist via the
    # builder stage), the resolved deps (package.json / package-lock.json), the
    # TypeScript build config, and the pipelines/ + scripts/ trees (see the COPY
    # statements in .docker/Dockerfile). Previously this only fired on Dockerfile
    # changes, so source fixes shipped to the server (deploy.yml, every master push)
    # but never reached the runner pods that actually run the pipeline — freezing
    # them at the last Dockerfile edit.
    paths:
      - src/**
      - package.json
      - package-lock.json
      - tsconfig.json
      - pipelines/**
      - scripts/**
      - .docker/Dockerfile
      - .github/workflows/build-runner-generic-image.yml

env:
  AWS_REGION: us-east-1
  ECR_IMAGE: 435747240845.dkr.ecr.us-east-1.amazonaws.com/services/gooseherd/runners/generic

jobs:
  build-and-push:
    runs-on: [self-hosted, linux, x64, medium]
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - name: Check out repository code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push runner-generic image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: .docker/Dockerfile
          platforms: linux/amd64
          push: true
          target: runner
          tags: |
            ${{ env.ECR_IMAGE }}:latest
            ${{ env.ECR_IMAGE }}:${{ github.sha }}
