name: homepage-title
description: "Change the homepage title text — simple UI change with clear expected outcome"

repo: epiccoders/pxls
base_branch: main
task: |
  Change the homepage h1 title from "Ship amazing designs faster." to "Welcome to Epic Pixels"

enable_nodes: [scope_judge]

judges:
  - type: status
    expect: completed

  - type: files_changed
    expect_any:
      - "app/helpers/seo_helper.rb"
      - "app/views/landing/index.html.erb"
      - "app/views/pages/home.html.erb"

  - type: diff_contains
    patterns:
      - "Welcome to Epic Pixels"

  - type: gate_verdict
    gate: scope_judge
    expect: pass

config_overrides:
  DEFAULT_LLM_MODEL: "anthropic/claude-sonnet-4-6"
  AGENT_COMMAND_TEMPLATE: "cd {{repo_dir}} && pi -p @{{prompt_file}} --model openrouter/anthropic/claude-sonnet-4.6 --no-session --mode json --tools read,write,edit,bash,grep,find,ls"

tags: [ui, simple, rails]
