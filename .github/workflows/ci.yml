name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: [self-hosted, linux, x64, medium]
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: gooseherd
          POSTGRES_PASSWORD: gooseherd
          POSTGRES_DB: gooseherd_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U gooseherd"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL_TEST: postgres://gooseherd:gooseherd@localhost:5432/gooseherd_test

    steps:
      - name: Check out repository code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run checks
        run: npm run check

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test
        timeout-minutes: 10
