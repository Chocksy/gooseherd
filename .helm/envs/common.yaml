configs:
  gooseherd-config:
    data:
      APP_NAME: "Gooseherd"
      DASHBOARD_ENABLED: "true"
      DASHBOARD_HOST: "0.0.0.0"
      DASHBOARD_PORT: "8787"
      DASHBOARD_PUBLIC_URL: "https://gooseherd.hbstf.co"
      OBSERVER_WEBHOOK_PORT: "9090"
      RUNNER_CONCURRENCY: "1"
      WORK_ROOT: "/app/work"
      DATA_DIR: "/app/data"
      DRY_RUN: "false"
      PIPELINE_FILE: "pipelines/pipeline.yml"
      DEFAULT_BASE_BRANCH: "master"
      BRANCH_PREFIX: "gooseherd"
      GIT_AUTHOR_NAME: "Gooseherd"
      GIT_AUTHOR_EMAIL: "gooseherd-bot@hubstaff.com"
      GITHUB_DEFAULT_OWNER: "NetsoftHoldings"
      JIRA_CLOUD_ID: "f08f7806-067d-4c7e-a389-ab81e39039dc"
      JIRA_BASE_URL: "https://netsoftllc.atlassian.net"
      JIRA_REQUEST_TIMEOUT_MS: "10000"
      REPO_ALLOWLIST: "NetsoftHoldings/hubstaff-server,NetsoftHoldings/gooseherd"
      WORK_ITEMS_ENABLED: "true"
      DEFAULT_TEAM_NAME: "default"
      DEFAULT_TEAM_SLACK_CHANNEL_ID: "C0AUL5D0KN3"
      SLACK_COMMAND_NAME: "gooseherd"
      SLACK_AUTH_REDIRECT_URI: "https://gooseherd.hbstf.co/auth/slack/callback"
      GITHUB_APP_ID: "3478231"
      GITHUB_APP_INSTALLATION_ID: "126441572"
      AUTO_REVIEW_DEBUG_LOG_MODE: "failures"
      FEATURE_DELIVERY_SKIP_QA_PREPARATION: "true"
      FEATURE_DELIVERY_SKIP_PRODUCT_REVIEW: "true"
      FEATURE_DELIVERY_RESET_ENGINEERING_REVIEW_ON_NEW_COMMITS: "false"
      FEATURE_DELIVERY_RESET_QA_REVIEW_ON_NEW_COMMITS: "false"
      BROWSER_VERIFY_ENABLED: "false"
      SCREENSHOT_ENABLED: "false"
      BROWSER_VERIFY_MODEL: "openai/gpt-5-mini"
      BROWSER_VERIFY_EXECUTION_MODEL: "google/gemini-3-flash-preview"
      ORCHESTRATOR_ENABLED: "true"
      ORCHESTRATOR_MODEL: "google/gemini-3.1-pro-preview"
      OBSERVER_ENABLED: "true"
      SCOPE_JUDGE_ENABLED: "true"
      CI_WAIT_ENABLED: "true"
      AUTO_REVIEW_BRANCH_SYNC_ENABLED: "true"
      AUTO_REVIEW_BRANCH_SYNC_MAX_BEHIND_COMMITS: "4"
      AUTO_REVIEW_BRANCH_SYNC_INTERVAL_MS: "900000"
      SANDBOX_RUNTIME: "kubernetes"
      KUBERNETES_NAMESPACE: '{{ .Release.Namespace }}'
      KUBERNETES_RUNNER_IMAGE: '{{ .Values.werf.image.runner | default "gooseherd/k8s-runner:dev" }}'
      KUBERNETES_INTERNAL_BASE_URL: 'http://gooseherd.{{ .Release.Namespace }}.svc.cluster.local:8787'
      KUBERNETES_RUNNER_ENV_SECRET: "gooseherd-env"
      KUBERNETES_RUNNER_ENV_CONFIGMAP: "gooseherd-config"
      AGENT_COMMAND_TEMPLATE: 'bash scripts/dummy-agent.sh {{ "{{repo_dir}}" }} {{ "{{prompt_file}}" }} {{ "{{run_id}}" }}'
      MAX_TASK_CHARS: "4000"
      AGENT_TIMEOUT_SECONDS: "1200"

secrets:
  gooseherd-env:
    secretKey: "int/gooseherd/full"
    properties:
      DATABASE_URL: "DATABASE_URL"
      ENCRYPTION_KEY: "ENCRYPTION_KEY"
      GITHUB_APP_PRIVATE_KEY: "GITHUB_APP_PRIVATE_KEY"
      OPENROUTER_API_KEY: "OPENROUTER_API_KEY"
      SLACK_BOT_TOKEN: "SLACK_BOT_TOKEN"
      SLACK_APP_TOKEN: "SLACK_APP_TOKEN"
      SLACK_SIGNING_SECRET: "SLACK_SIGNING_SECRET"
      SLACK_CLIENT_SECRET: "SLACK_CLIENT_SECRET"
      OBSERVER_GITHUB_WEBHOOK_SECRET: "OBSERVER_GITHUB_WEBHOOK_SECRET"
      DASHBOARD_TOKEN: "DASHBOARD_TOKEN"
      JIRA_API_TOKEN: "JIRA_API_TOKEN"
