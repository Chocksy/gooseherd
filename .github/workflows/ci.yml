name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: gooseherd
          POSTGRES_PASSWORD: gooseherd
          POSTGRES_DB: gooseherd_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U gooseherd"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL_TEST: postgres://gooseherd:gooseherd@localhost:5432/gooseherd_test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run check
      - run: npm run build
      - name: Run tests
        run: npm test
        timeout-minutes: 10
