{{- $cmp := "gooseherd" -}}
{{- $component := index .Values "gooseherd" -}}
{{- $serviceAccountName := dig "serviceAccount" "name" $cmp $component -}}
{{- if dig "rbac" "create" false $component }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $cmp }}-runtime
  labels: {{ include "common.labels" (merge (dict "cmp" $cmp) .) | nindent 4 }}
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "delete", "deletecollection"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $cmp }}-runtime
  labels: {{ include "common.labels" (merge (dict "cmp" $cmp) .) | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ $serviceAccountName }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $cmp }}-runtime
{{- end }}
