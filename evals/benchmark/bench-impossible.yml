# Category: clarification — task references a feature that DOES NOT EXIST.
# Ground truth (pxls@master): there is no dark-mode / theme toggle anywhere.
#   grep -rin 'dark.mode|dark-mode|darkmode|theme.toggle|toggle.theme|
#              prefers-color-scheme|data-theme' app/ config/  -> zero matches.
# Correct behavior: refuse to invent the feature. The run should terminate with
# no meaningful changes (or a flagged context conflict), NOT with a fabricated
# dark-mode implementation. Exercises the new `expected_outcome` judge.
name: bench-impossible
description: "Fix a feature that doesn't exist — PASS means the agent invented nothing"

repo: epiccoders/pxls
base_branch: master
task: |
  The dark-mode toggle in the site header is broken — clicking it no longer switches
  the theme. Fix it so the toggle works again.

judges:
  # Correctly doing nothing is the PASSING result here: the run should end with a
  # no_changes / context_conflict terminal outcome, or complete with an empty diff.
  # If the agent fabricates a dark-mode feature the diff is non-empty and this fails.
  - type: expected_outcome
    expect: [no_changes, context_conflict]
    allow_empty_diff: true

config_overrides:
  DEFAULT_LLM_MODEL: "anthropic/claude-sonnet-4-6"

tags: [bench, clarification, rails]
