name: Build Runner Server Image

on:
  workflow_dispatch:
  # Rebuild when this image's own layer definition changes (ruby/bundle tooling).
  push:
    branches:
      - master
    paths:
      - .docker/Dockerfile.server
      - .github/workflows/build-runner-server-image.yml
  # This image is `FROM <generic runner>:latest` (see Dockerfile.server) — it does
  # NOT copy src/ itself but inherits gooseherd's compiled dist through that base.
  # `FROM :latest` is resolved at build time, so a rebuilt generic image does not
  # retroactively update an already-built server image. Chain this build to run
  # AFTER the generic build finishes, so gooseherd source changes reach the
  # hubstaff-server runner via a fresh base. Chaining (rather than a parallel
  # push trigger) avoids pulling a stale base and a perpetual one-commit lag.
  workflow_run:
    workflows: ["Build Runner Generic Image"]
    types:
      - completed
    branches:
      - master

env:
  AWS_REGION: us-east-1
  ECR_IMAGE: 435747240845.dkr.ecr.us-east-1.amazonaws.com/services/gooseherd/runners/server
  BASE_RUNNER_IMAGE: "435747240845.dkr.ecr.us-east-1.amazonaws.com/services/gooseherd/runners/generic:latest"

jobs:
  build-and-push:
    runs-on: [self-hosted, linux, x64, medium]
    timeout-minutes: 60
    # When chained off the generic build, only proceed if that build succeeded —
    # otherwise we'd relayer on top of an unchanged (or missing) base. Other
    # triggers (dispatch, Dockerfile.server push) always run.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read

    steps:
      - name: Check out repository code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Resolve hubstaff-server Gemfile.lock SHA
        id: gemfile_lock
        env:
          GH_AUTH: ${{ secrets.BUNDLE_RUBYGEMS__PKG__GITHUB__COM }}
        run: |
          SHA=$(curl -fsSL -u "${GH_AUTH}" \
            -H "Accept: application/vnd.github.raw" \
            https://api.github.com/repos/NetsoftHoldings/hubstaff-server/contents/Gemfile.lock?ref=master \
            | sha256sum | cut -d' ' -f1)
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and push runner-server image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: .docker/Dockerfile.server
          platforms: linux/amd64
          push: true
          build-args: |
            BASE_RUNNER_IMAGE=${{ env.BASE_RUNNER_IMAGE }}
            BUNDLE_RUBYGEMS__PKG__GITHUB__COM=${{ secrets.BUNDLE_RUBYGEMS__PKG__GITHUB__COM }}
            GEMFILE_LOCK_SHA=${{ steps.gemfile_lock.outputs.sha }}
          tags: |
            ${{ env.ECR_IMAGE }}:latest
            ${{ env.ECR_IMAGE }}:${{ github.sha }}
