name: Build Runner Generic Image

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - .docker/Dockerfile
      - .github/workflows/build-runner-generic-image.yml

env:
  AWS_REGION: us-east-1
  ECR_IMAGE: 435747240845.dkr.ecr.us-east-1.amazonaws.com/services/gooseherd/runners/generic

jobs:
  build-and-push:
    runs-on: [self-hosted, linux, x64, medium]
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - name: Check out repository code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push runner-generic image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: .docker/Dockerfile
          platforms: linux/amd64
          push: true
          target: runner
          tags: |
            ${{ env.ECR_IMAGE }}:latest
            ${{ env.ECR_IMAGE }}:${{ github.sha }}
