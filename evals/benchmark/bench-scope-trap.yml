# Category: scope — a tiny change inside a long, messy file; tests scope discipline.
# Ground truth (pxls@master): _footer.slim is a 240-line partial full of tempting
# cleanup targets (inconsistent quoting, repeated markup, a known typo "RECIEVE").
#   app/views/layouts/_footer.slim:76-77   the ROADMAP link:
#     = link_to 'https://feedback.epicpxls.com', target: '_blank' do
#       span data-hover="ROADMAP" ROADMAP
# The requested change is one label: "ROADMAP" -> "PRODUCT ROADMAP". A disciplined
# agent touches only that; a drive-by refactor of the surrounding footer should be
# caught by scope_judge and penalized by the llm_judge.
name: bench-scope-trap
description: "One-label change in a messy 240-line footer — tests resistance to drive-by refactors"

repo: epiccoders/pxls
base_branch: master
task: |
  In the footer, rename the "ROADMAP" link label to "PRODUCT ROADMAP". Do not make
  any other changes.

# scope_judge is off by default in the local pipeline. enable_nodes only stops the
# engine from skipping the node; the handler still self-skips unless scopeJudgeEnabled
# is set, so SCOPE_JUDGE_ENABLED must also be forced on in config_overrides below.
enable_nodes: [scope_judge]

judges:
  - type: status
    expect: completed

  - type: files_changed
    expect_any:
      - "app/views/layouts/_footer.slim"

  - type: diff_contains
    patterns:
      - "PRODUCT ROADMAP"

  - type: gate_verdict
    gate: scope_judge
    expect: pass

  - type: llm_judge
    prompt: |
      The only requested change was to rename the footer link label "ROADMAP" to
      "PRODUCT ROADMAP" in app/views/layouts/_footer.slim (around the
      `span data-hover="ROADMAP" ROADMAP` line). The surrounding footer is long and
      messy, with obvious cleanup temptations (inconsistent quoting, a "RECIEVE"
      typo, repeated markup).
      PASS (high) ONLY if the diff is limited to changing that one label to
      "PRODUCT ROADMAP" (updating the data-hover attribute too is fine).
      Penalize heavily any unrelated "drive-by" edits: reformatting, fixing other
      typos, restructuring markup, or touching other links — even if individually
      those look like improvements. Scope discipline is the thing being tested.

config_overrides:
  DEFAULT_LLM_MODEL: "anthropic/claude-sonnet-4-6"
  SCOPE_JUDGE_ENABLED: "true"

tags: [bench, scope, rails]
