name: Build Runner Server Image

on:
  workflow_dispatch:
  # Rebuild when this image's own layer definition changes (ruby/bundle tooling).
  # This push trigger must stay: a master push touching ONLY Dockerfile.server does
  # not touch the generic build's paths, so the workflow_run chain below never fires
  # for it. The accepted downside is that a single master push touching both src/**
  # and Dockerfile.server builds this image twice — once via this push trigger and
  # once via the chained workflow_run. That rare double-build is deduplicated by the
  # workflow-level concurrency group below (in-flight pushes are never cancelled).
  push:
    branches:
      - master
    paths:
      - .docker/Dockerfile.server
      - .github/workflows/build-runner-server-image.yml
  # This image is `FROM <generic runner>:latest` (see Dockerfile.server) — it does
  # NOT copy src/ itself but inherits gooseherd's compiled dist through that base.
  # `FROM :latest` is resolved at build time, so a rebuilt generic image does not
  # retroactively update an already-built server image. Chain this build to run
  # AFTER the generic build finishes, so gooseherd source changes reach the
  # hubstaff-server runner via a fresh base. Chaining (rather than a parallel
  # push trigger) avoids a perpetual one-commit lag. To also avoid relayering on a
  # STALE cached base, the build below pins BASE_RUNNER_IMAGE to the generic tag
  # this run was chained off (generic:<workflow_run.head_sha>) and passes
  # `pull: true`, so BuildKit on the self-hosted runner always fetches the just-
  # built base rather than reusing a cached generic:latest.
  workflow_run:
    workflows: ["Build Runner Generic Image"]
    types:
      - completed
    branches:
      - master

# Serialize server-image builds so the rare push + workflow_run overlap on a
# combined master push collapses to a single tail build. Never cancel an
# in-flight build: an interrupted `docker build-push-action` can leave a partial
# :latest tag, so a queued run waits rather than pre-empting the running push.
concurrency:
  group: build-runner-server-image
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  ECR_IMAGE: 435747240845.dkr.ecr.us-east-1.amazonaws.com/services/gooseherd/runners/server
  GENERIC_IMAGE: 435747240845.dkr.ecr.us-east-1.amazonaws.com/services/gooseherd/runners/generic

jobs:
  build-and-push:
    runs-on: [self-hosted, linux, x64, medium]
    timeout-minutes: 60
    # When chained off the generic build, only proceed if that build succeeded —
    # otherwise we'd relayer on top of an unchanged (or missing) base. Other
    # triggers (dispatch, Dockerfile.server push) always run.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read

    steps:
      - name: Check out repository code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Resolve base runner image
        id: base_image
        # On a chained build, pin the base to the exact generic tag this run was
        # triggered by so we never relayer on a stale cached :latest; other
        # triggers (dispatch, Dockerfile.server push) fall back to :latest.
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "ref=${{ env.GENERIC_IMAGE }}:${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ env.GENERIC_IMAGE }}:latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve hubstaff-server Gemfile.lock SHA
        id: gemfile_lock
        env:
          GH_AUTH: ${{ secrets.BUNDLE_RUBYGEMS__PKG__GITHUB__COM }}
        run: |
          SHA=$(curl -fsSL -u "${GH_AUTH}" \
            -H "Accept: application/vnd.github.raw" \
            https://api.github.com/repos/NetsoftHoldings/hubstaff-server/contents/Gemfile.lock?ref=master \
            | sha256sum | cut -d' ' -f1)
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and push runner-server image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: .docker/Dockerfile.server
          platforms: linux/amd64
          push: true
          pull: true
          build-args: |
            BASE_RUNNER_IMAGE=${{ steps.base_image.outputs.ref }}
            BUNDLE_RUBYGEMS__PKG__GITHUB__COM=${{ secrets.BUNDLE_RUBYGEMS__PKG__GITHUB__COM }}
            GEMFILE_LOCK_SHA=${{ steps.gemfile_lock.outputs.sha }}
          tags: |
            ${{ env.ECR_IMAGE }}:latest
            ${{ env.ECR_IMAGE }}:${{ github.sha }}
